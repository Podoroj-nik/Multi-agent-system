version: '3.8'

services:
  backend:
    image: yourusername/ai-pm-backend:latest
    container_name: ai-pm-backend
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
    environment:
      - YANDEX_FOLDER_ID=${YANDEX_FOLDER_ID}
      - YANDEX_API_KEY=${YANDEX_API_KEY}
      - YANDEX_DISK_TOKEN=${YANDEX_DISK_TOKEN}
    networks:
      - ai-pm-network
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: yourusername/ai-pm-frontend:latest
    container_name: ai-pm-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - ai-pm-network

networks:
  ai-pm-network:
    driver: bridge